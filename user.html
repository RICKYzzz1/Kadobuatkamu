<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Halaman Terkunci</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f4f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        #kotak-login { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 300px; 
        }

        h2 { color: #333; margin-bottom: 20px; }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 5px; 
            box-sizing: border-box; 
        }

        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s;
        }

        button:hover { background-color: #0056b3; }
        
        #pesan-salah { 
            color: #d9534f; 
            font-size: 14px; 
            display: none; 
            margin-top: 15px; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="kotak-login">
        <h2>🔒 Akses Terbatas</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="bukaHalaman()">Buka Akses</button>
        <p id="pesan-salah">Username atau Password Salah!</p>
    </div>

    <script>
        function bukaHalaman() {
            // Data login
            var idBenar = "ikatri";
            var passBenar = "ikatri123";

            // Ambil input dari user
            var userKetik = document.getElementById("user").value;
            var passKetik = document.getElementById("pass").value;

            if (userKetik === idBenar && passKetik === passBenar) {
                /* BAGIAN PENTING:
                   Ganti "halaman_kamu.html" di bawah ini dengan 
                   nama file HTML yang sudah kamu siapkan tadi.
                */
                window.location.href = "Kado.html"; 
            } else {
                // Jika salah, tampilkan pesan merah dan alert
                document.getElementById("pesan-salah").style.display = "block";
                alert("Akses Ditolak! Coba cek lagi.");
            }
        }
    </script>

</body>
</html>
